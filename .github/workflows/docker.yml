name: Docker CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Backend
        run: docker build -t backend -f docker/backend.Dockerfile .

      - name: Build Frontend
        run: docker build -t frontend -f docker/frontend.Dockerfile .